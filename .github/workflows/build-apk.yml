name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk \
            libffi-dev libssl-dev libltdl-dev \
            autoconf automake libtool pkg-config \
            liblzma-dev uuid-dev
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Build (autofix harfbuzz on failure)
        run: |
          cd $GITHUB_WORKSPACE
          # First attempt - will fail at SDL2_ttf harfbuzz
          buildozer android debug 2>&1 || true

          # Patch hb-ft.cc to suppress clang cast-function-type-strict
          echo "=== Patching hb-ft.cc ==="
          python3 << 'PYEOF'
import os
for root, dirs, files in os.walk(os.path.expanduser('~/.buildozer')):
    for f in files:
        if f == 'hb-ft.cc':
            path = os.path.join(root, f)
            with open(path, 'r') as fh:
                content = fh.read()
            if '#pragma clang diagnostic' not in content:
                pragma = '#pragma clang diagnostic ignored "-Wcast-function-type-strict"\n'
                content = pragma + content
                with open(path, 'w') as fh:
                    fh.write(content)
                print(f'  Patched: {path}')
            else:
                print(f'  Already patched: {path}')
PYEOF

          echo "=== Retrying build with patched harfbuzz ==="
          buildozer android debug
        env:
          ANDROID_HOME: /root/android-sdk
          ANDROID_SDK_ROOT: /root/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mechbookkeeping-debug
          path: ${{ github.workspace }}/bin/*.apk
