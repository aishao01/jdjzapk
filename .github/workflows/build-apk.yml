name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk \
            libffi-dev libssl-dev libltdl-dev \
            autoconf automake libtool pkg-config \
            liblzma-dev uuid-dev
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV

      - name: Build
        run: |
          cd $GITHUB_WORKSPACE
          # First build - will fail at harfbuzz
          buildozer android debug 2>&1 || true
          # Fix harfbuzz C-style casts and retry
          python3 .github/scripts/fix_harfbuzz.py
          echo "=== Retrying build ==="
          buildozer android debug
        env:
          ANDROID_HOME: /root/android-sdk
          ANDROID_SDK_ROOT: /root/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mechbookkeeping-debug
          path: ${{ github.workspace }}/bin/*.apk
