name: Build APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openjdk-17-jdk \
            libffi-dev libssl-dev libltdl-dev \
            autoconf automake libtool pkg-config \
            liblzma-dev uuid-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev
          python -m pip install --upgrade pip setuptools wheel
          pip install buildozer cython
          # Set Java home
          echo "JAVA_HOME=/usr/lib/jvm/java-17-openjdk-amd64" >> $GITHUB_ENV
          # Suppress strict clang warnings for SDL2_ttf harfbuzz
          echo "CXXFLAGS=-Wno-cast-function-type-strict" >> $GITHUB_ENV

      - name: Build with Buildozer
        run: |
          cd $GITHUB_WORKSPACE
          buildozer android debug
        env:
          ANDROID_HOME: /root/android-sdk
          ANDROID_SDK_ROOT: /root/android-sdk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: mechbookkeeping-debug
          path: ${{ github.workspace }}/bin/*.apk
